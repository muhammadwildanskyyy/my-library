# =============================================================================
# Alembic Configuration
# =============================================================================
# NOTE: sqlalchemy.url is overridden in migrations/env.py from app settings.

[alembic]
script_location = migrations
prepend_sys_path = .

# Overridden programmatically — this is just a placeholder
sqlalchemy.url = postgresql+asyncpg://librarian:librarian_secret@localhost:5432/ai_librarian

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
